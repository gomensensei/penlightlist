<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title data-i18n="app_title">AKB48 成員名單及應援色</title>
    <!-- 引入日系字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="topbar">
        <div class="brand"><i data-lucide="sparkles"></i> <span data-i18n="app_title">AKB48 成員名單及應援色</span></div>
        <div class="topbar-right">
            <select class="lang-select" id="langSelector">
                <option value="zh-HK">繁體</option>
                <option value="zh-CN">简体</option>
                <option value="ja">日本語</option>
                <option value="en">English</option>
                <option value="ko">한국어</option>
                <option value="th">ไทย</option>
                <option value="id">Bahasa Indonesia</option>
            </select>
            <button id="themeToggle" class="icon-btn"><i data-lucide="moon" size="18"></i></button>
        </div>
    </header>

    <div class="main-container">
        
        <!-- 預覽面板 (Mobile 上, PC 左) -->
        <main class="preview-panel panel">
            <div class="header-edit-area">
                <div class="title-input-wrapper">
                    <i data-lucide="edit-3" size="24" class="pulse-icon"></i>
                    <input type="text" id="customTitle" class="custom-title-input" value="「ここからだ」公演" placeholder="📝 點擊輸入公演名稱...">
                </div>
                <select id="presetSelector" class="preset-select">
                    <option value="" data-i18n="preset_placeholder">-- 快速載入公演模板 (空白格) --</option>
                    <option value="16">「ここからだ」公演 (16人)</option>
                    <option value="16">「そこに未来はある」公演 (16人)</option>
                    <option value="8">「手をつなぎながら」公演 (8人)</option>
                    <option value="8">「RESET」公演 (8人)</option>
                </select>
            </div>
            <!-- 動態 Flexbox Grid -->
            <div id="htmlGrid"></div>
        </main>

        <!-- 控制面板 (Mobile 下, PC 右) -->
        <aside class="controls-panel panel">
            
            <div class="control-group">
                <label class="title" data-i18n="ctrl_gen_load">一鍵載入期生全體</label>
                <select id="genSelector" class="preset-select" style="width: 100%;">
                    <option value="" data-i18n="gen_placeholder">-- 選擇期數全體載入 --</option>
                    <option value="13期生">13期生</option>
                    <option value="15期生">15期生</option>
                    <option value="16期生">16期生</option>
                    <option value="17期生">17期生</option>
                    <option value="18期生">18期生</option>
                    <option value="19期生">19期生</option>
                    <option value="20期生">20期生</option>
                    <option value="21期生">21期生</option>
                    <option value="Team 8">Team 8</option>
                    <option value="ドラフト生">ドラフト生</option>
                </select>
            </div>

            <div class="control-group">
                <label class="title" data-i18n="ctrl_grid">Grid 格數控制</label>
                <div class="flex-btns">
                    <button class="btn" onclick="setGridSize(8)" data-i18n="btn_8">8 人</button>
                    <button class="btn" onclick="setGridSize(12)" data-i18n="btn_12">12 人</button>
                    <button class="btn" onclick="setGridSize(16)" data-i18n="btn_16">16 人</button>
                </div>
                <div class="flex-btns">
                    <button class="btn" onclick="changeGridBy(-1)"><i data-lucide="minus" size="16"></i> <span data-i18n="btn_minus">減 1 格</span></button>
                    <button class="btn" onclick="changeGridBy(1)"><i data-lucide="plus" size="16"></i> <span data-i18n="btn_plus">加 1 格</span></button>
                </div>
            </div>

            <div class="control-group">
                <label class="title" data-i18n="ctrl_display">顯示內容設定</label>
                <label class="toggle-label"><input type="checkbox" id="cfgPhoto" checked> <span data-i18n="cfg_photo">顯示成員圓形頭像</span></label>
                <label class="toggle-label"><input type="checkbox" id="cfgGen" checked> <span data-i18n="cfg_gen">顯示期別</span></label>
                <label class="toggle-label"><input type="checkbox" id="cfgName" checked> <span data-i18n="cfg_name">顯示名字</span></label>
                <label class="toggle-label"><input type="checkbox" id="cfgNick"> <span data-i18n="cfg_nick">顯示暱稱</span></label>
            </div>

            <div class="control-group">
                <label class="title" data-i18n="ctrl_color_mode">應援色呈現方式</label>
                <label class="toggle-label"><input type="radio" name="colorMode" value="block" checked> <span data-i18n="mode_block">色塊方格 (打斜各半AB色)</span></label>
                <label class="toggle-label"><input type="radio" name="colorMode" value="text"> <span data-i18n="mode_text">陰影色字 (單色底高對比)</span></label>
            </div>

            <div class="control-group">
                <label class="title" data-i18n="ctrl_sort">排列方式</label>
                <div class="flex-btns">
                    <button class="btn" onclick="sortByColor()"><i data-lucide="palette" size="16"></i> <span data-i18n="sort_color">按顏色</span></button>
                    <button class="btn" onclick="sortByGen()"><i data-lucide="users" size="16"></i> <span data-i18n="sort_gen">按期數</span></button>
                </div>
            </div>

            <div class="control-group" style="margin-top: 32px;">
                <button class="btn btn-primary" id="downloadBtn" style="width:100%; padding: 16px; font-size: 1.1rem; border-radius: 99px;">
                    <i data-lucide="download"></i> <span data-i18n="btn_download">下載名單</span>
                </button>
            </div>
        </aside>
    </div>

    <footer class="app-footer" data-i18n="copyright_notice">
        希望新粉絲能進一步了解如何支持成員，現有粉絲能推し増し，並就不同公演與演唱會分享應援資訊。網站僅供非商業用途使用，版權歸©AKB48及株式会社DH所有。
    </footer>

    <!-- 隱藏畫布 -->
    <canvas id="exportCanvas"></canvas>
    
    <div id="loadingOverlay">
        <div class="spinner"></div>
        <div data-i18n="loading">渲染高解析度圖片中...</div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="memberModal">
        <div class="modal-content">
            <div class="modal-header">
                <span data-i18n="modal_title">選擇成員</span>
                <button class="icon-btn" onclick="closeModal()"><i data-lucide="x" size="20"></i></button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
